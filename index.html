    <!--
      Load Google Fonts non-blocking. The print/onload trick fetches the
      stylesheet without blocking the critical rendering path, then swaps it
      to all-media when ready. The <noscript> mirror keeps things working
      with JS disabled.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Outfit:wght@300..900&family=Space+Grotesk:wght@300..700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all';this.onload=null"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Outfit:wght@300..900&family=Space+Grotesk:wght@300..700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
